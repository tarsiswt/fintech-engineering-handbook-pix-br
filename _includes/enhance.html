<script>
// Two sidebar enhancements that Quarto can't express declaratively for a
// single-document, left-TOC layout:
//   1. A "Take it with you" download section pinned below the TOC.
//   2. A scrollspy that highlights the current section as you scroll/click
//      (Quarto's built-in highlight does not track scroll for a left TOC).
(function () {
  // External links shown in the sidebar footer. Edit these two URLs as needed.
  var GITHUB_URL = 'https://github.com/Krever/fintech-engineering-handbook';
  var LINKEDIN_URL = 'https://www.linkedin.com/in/krever/';
  // ElevenReader share link — paste the real URL after publishing the audiobook.
  var AUDIOBOOK_URL = 'https://elevenreader.io/audiobooks/fintech-engineering-handbook/rPOltSogE64bCrbomHCu'; // e.g. 'https://elevenreader.io/...' ; empty = hidden

  function footerMarkup() {
    var listen = AUDIOBOOK_URL
      ? '<a class="download-pill download-pill--listen" href="' + AUDIOBOOK_URL + '" target="_blank" rel="noopener">' +
          '<i class="bi bi-headphones"></i> Audiobook</a>'
      : '';
    return '' +
      '<nav class="download-bar" aria-label="Download this handbook">' +
        '<span class="download-bar__label">Take it with you</span>' +
        '<span class="download-pills">' +
          '<a class="download-pill" href="index.pdf"  download>PDF</a>' +
          '<a class="download-pill" href="index.epub" download>EPUB</a>' +
          listen +
        '</span>' +
      '</nav>' +
      '<nav class="sidebar-links" aria-label="Source and author">' +
        '<a href="' + GITHUB_URL + '" target="_blank" rel="noopener">' +
          '<i class="bi bi-github"></i> Source on GitHub</a>' +
        '<a href="' + LINKEDIN_URL + '" target="_blank" rel="noopener">' +
          '<i class="bi bi-linkedin"></i> Voytek Pitula</a>' +
      '</nav>';
  }

  // Mobile-only "grab it" card. The left TOC (and its pinned footer) is hidden
  // below 768px, so the download/source links would otherwise be unreachable.
  // Rather than bury a copy at the bottom of the article (poor discoverability),
  // we surface a compact card right under the title block — the first thing a
  // phone reader sees. Shown only on small screens via CSS.
  function grabCardMarkup() {
    var listen = AUDIOBOOK_URL
      ? '<a class="grab-card__btn" href="' + AUDIOBOOK_URL + '" target="_blank" rel="noopener">' +
          '<i class="bi bi-headphones"></i> Audiobook</a>'
      : '';
    return '' +
      '<span class="grab-card__label">Take it with you</span>' +
      '<div class="grab-card__actions">' +
        '<a class="grab-card__btn" href="index.pdf"  download><i class="bi bi-file-earmark-arrow-down"></i> PDF</a>' +
        '<a class="grab-card__btn" href="index.epub" download><i class="bi bi-book"></i> EPUB</a>' +
        listen +
      '</div>' +
      '<nav class="grab-card__links" aria-label="Source and author">' +
        '<a href="' + GITHUB_URL + '" target="_blank" rel="noopener">' +
          '<i class="bi bi-github"></i> Source</a>' +
        '<a href="' + LINKEDIN_URL + '" target="_blank" rel="noopener">' +
          '<i class="bi bi-linkedin"></i> Voytek Pitula</a>' +
      '</nav>';
  }

  function injectFooter() {
    // Desktop/tablet (>=768px): pinned below the left TOC.
    const sidebar = document.querySelector('#quarto-sidebar-toc-left');
    if (sidebar && !sidebar.querySelector('.sidebar-footer')) {
      const footer = document.createElement('div');
      footer.className = 'sidebar-footer';
      footer.innerHTML = footerMarkup();
      sidebar.appendChild(footer);
    }
    // Mobile (<768px): a discoverable card just after the title block.
    const title = document.querySelector('#title-block-header');
    if (title && !document.querySelector('.grab-card')) {
      const card = document.createElement('aside');
      card.className = 'grab-card';
      card.setAttribute('aria-label', 'Get this handbook');
      card.innerHTML = grabCardMarkup();
      title.insertAdjacentElement('afterend', card);
    }
  }

  function scrollspy() {
    const links = Array.from(document.querySelectorAll('#TOC .nav-link'));
    if (!links.length) return;
    const items = links.map(link => {
      const target = (link.getAttribute('data-scroll-target') || link.getAttribute('href') || '').replace(/^#/, '');
      const el = target ? document.getElementById(target) : null;
      return el ? { link, el } : null;
    }).filter(Boolean); // document order === TOC order
    if (!items.length) return;

    const OFFSET = 120;
    let activeLink = null;
    function update() {
      let current = items[0];
      for (const it of items) {
        if (it.el.getBoundingClientRect().top - OFFSET <= 0) current = it;
        else break;
      }
      if (current.link === activeLink) return;
      if (activeLink) activeLink.classList.remove('active');
      current.link.classList.add('active');
      activeLink = current.link;
    }
    document.addEventListener('scroll', update, { passive: true });
    window.addEventListener('resize', update);
    update();
  }

  // Download counting without touching UX. The PDF/EPUB links remain plain
  // `download` anchors (instant save, no redirect), so we don't preventDefault.
  // On click we additionally load a tiny hidden tracking page in an iframe;
  // that page fires the Cloudflare beacon, registering a pageview at
  // /dl/pdf.html or /dl/epub.html. Read those paths in the Cloudflare Web
  // Analytics dashboard to see download counts. (Counts only — a static,
  // login-less site cannot attribute downloads to a person.)
  function trackDownloads() {
    document.addEventListener('click', function (e) {
      const a = e.target.closest('a[download]');
      if (!a) return;
      const href = a.getAttribute('href') || '';
      let page = null;
      if (/index\.pdf$/.test(href)) page = 'dl/pdf.html';
      else if (/index\.epub$/.test(href)) page = 'dl/epub.html';
      if (!page) return;
      const ping = document.createElement('iframe');
      ping.src = page;
      ping.setAttribute('aria-hidden', 'true');
      ping.style.cssText = 'position:absolute;width:0;height:0;border:0;left:-9999px;';
      document.body.appendChild(ping);
      // The real download keeps the page alive, so the beacon has time to send;
      // clean up the iframe a few seconds later.
      setTimeout(function () { ping.remove(); }, 5000);
    }, { passive: true });
  }

  function init() { injectFooter(); scrollspy(); trackDownloads(); }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
