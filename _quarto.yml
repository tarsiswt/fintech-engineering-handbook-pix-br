project:
  type: default
  output-dir: public
  render:
    - index.qmd
  # Copy the favicon into the output dir (it's referenced from the <head> below;
  # the format-level `favicon:` key only works for website projects, not this one).
  resources:
    - assets/favicon.png

# Single source of truth: index.qmd. Every output below is generated from it.
format:
  # Beautiful, scannable single page with a sticky left-hand table of contents.
  html:
    theme:
      - cosmo
      - theme.scss
    include-in-header:
      - _includes/head.html
    toc: true
    toc-location: left
    toc-depth: 4
    toc-expand: true
    toc-title: "Sumário"
    smooth-scroll: true
    anchor-sections: true
    link-external-icon: true
    link-external-newwindow: true
    code-copy: true
    # Our own download bar is the single source of truth for the other formats;
    # disable Quarto's auto "Other Formats" list (it labels the PDF "Typst" and
    # cannot show MOBI).
    format-links: false
    include-after-body:
      - _includes/enhance.html
    grid:
      sidebar-width: 320px
      body-width: 860px

  # Ebook + print formats. Quality is intentionally not a priority here.
  # Typst is bundled with Quarto, so PDF needs no LaTeX/TinyTeX install.
  typst:
    papersize: a4
    toc: true
    toc-title: "Sumário"

  epub:
    toc: true
    # Use the rendered cover (assets/cover.png, from cover.typ) as the EPUB cover.
    cover-image: assets/cover.png
